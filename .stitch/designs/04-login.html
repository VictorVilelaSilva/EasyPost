<main class="relative z-10 w-full max-w-[400px] flex flex-col items-center">
<!-- Brand Mark -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-white border border-outline-variant/30 rounded-2xl shadow-sm flex items-center justify-center mb-4 transition-standard hover:shadow-md">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="format_paint">format_paint</span>
</div>
<h1 class="headline-font text-2xl font-extrabold text-on-surface tracking-tight">Orçamento de Pintura</h1>
<p class="text-on-surface-variant text-sm mt-1">Entre com sua conta para continuar</p>
</div>
<!-- Sign-in Card -->
<div class="w-full bg-white border border-[#e2e8f0] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface" for="email">E-mail</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-white border border-[#e2e8f0] rounded-lg text-on-surface placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-standard text-sm" id="email" name="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block text-sm font-medium text-on-surface" for="password">Senha</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-standard" href="#">Esqueceu a senha?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-white border border-[#e2e8f0] rounded-lg text-on-surface placeholder-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-standard text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-standard" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<button class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-primary-dim focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-standard active:scale-[0.98]" type="submit">
                    Entrar
                </button>
</form>
<div class="mt-8 flex items-center justify-center space-x-2">
<span class="h-px w-full bg-[#e2e8f0]"></span>
<span class="text-xs uppercase tracking-widest text-outline-variant font-semibold">ou</span>
<span class="h-px w-full bg-[#e2e8f0]"></span>
</div>
<!-- Social Login Mockup -->
<button class="mt-6 w-full flex items-center justify-center gap-3 py-2.5 px-4 border border-[#e2e8f0] rounded-lg text-sm font-medium text-on-surface hover:bg-surface-container-low transition-standard">

                Entrar com o Google
            </button>
</div>
<!-- Footer link -->
<p class="mt-8 text-center text-sm text-on-surface-variant">
            Não tem conta? 
            <a class="font-bold text-primary hover:underline hover:text-primary-dim transition-standard" href="#">
                Cadastre-se
            </a>

<footer class="absolute bottom-6 w-full text-center px-4">
<p class="text-[10px] text-outline-variant uppercase tracking-widest headline-font font-medium">
            © 2024 PaintQuote Pro • Segurança de Nível Corporativo
        </p>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = 'visibility_off';
                toggleIcon.setAttribute('data-icon', 'visibility_off');
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = 'visibility';
                toggleIcon.setAttribute('data-icon', 'visibility');
            }
        }

        // Add a subtle parallax effect to the decorative blob
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const blobs = document.querySelectorAll('.absolute.inset-0 div');
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 20;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
