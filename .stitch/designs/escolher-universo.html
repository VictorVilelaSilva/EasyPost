<script>
        // Simple script to handle visual selection state across radio buttons
        document.querySelectorAll('input[name="universe"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Reset all
                document.querySelectorAll('label').forEach(label => {
                    label.classList.remove('border-2', 'border-primary');
                    label.classList.add('border', 'border-surface-container-high');
                    const img = label.querySelector('img');
                    if(img) {
                        img.classList.add('grayscale', 'opacity-60');
                        img.classList.remove('opacity-80');
                    }
                    const checkIcon = label.querySelector('.material-symbols-outlined');
                    if (checkIcon && checkIcon.parentElement.classList.contains('absolute')) {
                        checkIcon.parentElement.remove();
                    }
                    const textSpan = label.querySelector('span:not(.material-symbols-outlined)');
                    if(textSpan) {
                         textSpan.classList.remove('text-primary');
                         textSpan.classList.add('text-on-surface-variant');
                         label.querySelector('div:last-child').classList.remove('bg-surface-container');
                    }
                });

                // Apply active state
                if (e.target.checked) {
                    const activeLabel = e.target.closest('label');
                    activeLabel.classList.remove('border', 'border-surface-container-high');
                    activeLabel.classList.add('border-2', 'border-primary');
                    
                    const img = activeLabel.querySelector('img');
                    if(img) {
                        img.classList.remove('grayscale', 'opacity-60');
                        img.classList.add('opacity-80');
                    }

                    const textContainer = activeLabel.querySelector('div:last-child');
                    textContainer.classList.add('bg-surface-container');
                    const textSpan = textContainer.querySelector('span');
                    if(textSpan) {
                        textSpan.classList.remove('text-on-surface-variant');
                        textSpan.classList.add('text-primary');
                    }

                    // Add check icon
                    const iconHTML = `
                        <div class="absolute top-sm right-sm bg-primary text-background rounded-full p-xs flex items-center justify-center shadow-md transition-all duration-300 scale-in">
                            <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;" data-icon="check_circle">check_circle</span>
                        </div>
                    `;
                    activeLabel.insertAdjacentHTML('beforeend', iconHTML);
                }
            });
        });
    </script>
