services:
  easypost:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      # Banco no volume persistente (NÃO usar ./dev.db em produção)
      - DATABASE_URL=file:/app/data/prod.db
      # Defina estes no arquivo .env ao lado do compose:
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    volumes:
      - easypost-data:/app/data
    restart: unless-stopped

volumes:
  easypost-data:
